{% extends 'website/components/base.html' %}
{% block title %}Login{% endblock %}
{% load static %}
{% block body %}

<!-- Page Title -->
<section class="page-title">
    <div class="auto-container">
    </div>
</section>
<!--End Page Title-->

<!-- Login Section -->
<section class="login-section" style="padding-top: 50px;">
    <div class="auto-container">
        <div class="login-box">

            <!-- Title Box -->
            <div class="title-box">
                <h2>Login</h2>
                <div class="text"><span class="theme_color">Welcome!</span> Please confirm that you are visiting
                </div>
            </div>

            <!-- Login Form -->
            <div class="styled-form">
                <form method="POST" action="{{login_url}}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" value="" placeholder="Email" required="">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" value="" placeholder="Password" required="">
                    </div>
                    <div class="form-group text-center">
                        <button type="submit" class="theme-btn btn-style-three"><span class="txt">Login <i
                                    class="fa fa-angle-right"></i></span></button>
                    </div>
                    <div class="form-group">
                        <div class="users">New User? <a href="{{register_url}}">Sign Up</a></div>
                    </div>
                </form>
            </div>

        </div>
    </div>
</section>
<!-- End Login Section -->

{% endblock %}
