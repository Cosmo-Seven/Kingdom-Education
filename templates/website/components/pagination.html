{% load static %}

{% if blogs %}
<div class="styled-pagination">
    <ul class="clearfix">
        {% if blogs.has_previous %}
        <li class="prev"><a href="?page={{blogs.previous_page_number}}"><span class="fa fa-angle-left"></span> </a>
        </li>
        {% endif %}
        {% for num in blogs.paginator.page_range %}
        {% if blogs.number == num %}
        <li><a href="?page={{num}}" class="current">{{num}}</a></li>
        {% else %}
        <li><a href="?page={{num}}">{{num}}</a></li>
        {% endif %}
        {% endfor %}
        {% if blogs.has_next %}
        <li class="next"><a href="?page={{blogs.next_page_number}}"><span class="fa fa-angle-right"></span> </a></li>
        {% endif%}
    </ul>
</div>
{% endif %}
