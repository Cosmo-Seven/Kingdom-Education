{% extends 'website/components/base.html' %}
{% block title %}Register{% endblock %}
{% load static %}
{% block body %}
<!-- Page Title -->
<section class="page-title">
    <div class="auto-container">

    </div>
</section>
<!--End Page Title-->

<!-- Register Section -->
<section class="register-section" style="padding-top: 50px;">
    <div class="auto-container">
        <div class="register-box">

            <!-- Title Box -->
            <div class="title-box">
                <h2>Register</h2>
                <div class="text"><span class="theme_color">Welcome!</span> Please confirm that you are visiting
                </div>
            </div>

            <!-- Login Form -->
            <div class="styled-form">
                <form method="post" action="{{register_url}}">
                    {% csrf_token %}
                    <div class="row clearfix">

                        <!-- Form Group -->
                        <div class="form-group col-lg-12 col-md-12 col-sm-12">
                            <label>Username</label>
                            <input type="text" name="username" required>
                        </div>
                        <!-- Form Group -->
                        <div class="form-group col-lg-6 col-md-12 col-sm-12">
                            <label>Email Address</label>
                            <input type="email" name="email" required>
                        </div>

                        <!-- Form Group -->
                        <div class="form-group col-lg-6 col-md-12 col-sm-12">
                            <label>Phone Number</label>
                            <input type="text" name="phone" required>
                        </div>

                        <!-- Form Group -->
                        <div class="form-group col-lg-6 col-md-12 col-sm-12">
                            <label>Password</label>
                            <input type="password" name="password" required>
                        </div>

                        <!-- Form Group -->
                        <div class="form-group col-lg-6 col-md-12 col-sm-12">
                            <label>Confirm Password</label>
                            <input type="password" name="confirm_password" required>
                        </div>

                        <div class="form-group col-lg-12 col-md-12 col-sm-12">
                            <div class="row clearfix">
                                <!-- Column -->
                                {% for choice in gender_choices %}
                                <div class="column col-lg-4 col-md-4 col-sm-12">
                                    <div class="radio-box">
                                        <input type="radio" name="gender" id="gender-{{ choice.0 }}"
                                            value="{{ choice.0 }}">
                                        <label for="gender-{{ choice.0 }}">{{ choice.1 }}</label>
                                    </div>
                                </div>
                                {% endfor %}
                                <!-- Column -->
                                <div class="column col-lg-12 col-md-12 col-sm-12">
                                    <div class="check-box">
                                        <input required type="checkbox" name="agreement" id="type-4">
                                        <label id="agreement" for="type-4">I agree the user agreement and <a
                                                href="#">Terms
                                                & Conditions</a></label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="form-group col-lg-12 col-md-12 col-sm-12 text-center">
                            <button type="submit" class="theme-btn btn-style-three"><span class="txt">Sign Up <i
                                        class="fa fa-angle-right"></i></span></button>
                        </div>

                        <div class="form-group col-lg-12 col-md-12 col-sm-12">
                            <div class="users">Already have an account? <a href="{{login_url}}">Sign In</a></div>
                        </div>

                    </div>

                </form>
            </div>

        </div>
    </div>
</section>
<!-- End Login Section -->

{% endblock %}
