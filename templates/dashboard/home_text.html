{% extends 'dashboard/components/base.html' %}
{% block title %}Site Settings{% endblock %}
{% block body %}
{% load static %}
{% load translate %}
<div class="page-breadcrumb mb-3">
    <div class="my-auto mb-2">
        <h2 class="mb-1">Texts</h2>
        <nav>
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item">
                    <a href="{{ dashboard_url }}"><i class="ti ti-smart-home"></i></a>
                </li>
                <li class="breadcrumb-item">
                    Site Settings
                </li>
            </ol>
        </nav>
    </div>
</div>
<div class="card">
    <div class="card-body">
        <div class="border-bottom mb-3 pb-3">
            <h4>Texts</h4>
        </div>
        <form method="POST" action="{{home_text_url}}">
            {% csrf_token %}
            <div class="border-bottom mb-3">
                <div class="row">
                    <div class="col-12">
                        <label class="form-label">Title</label>
                        <input type="text" name="title" value="{{text.title}}" class="form-control">
                    </div>
                </div>
            </div>
            <div class="border-bottom mb-3">
                <h6 class="mb-3">Description</h6>
                <div class="row">
                    <div class="col-md-12">
                        <textarea name="description" class="form-control"
                            style="height: 150px;">{{text.description}}</textarea>
                    </div>

                </div>
            </div>
            <div class="d-flex align-items-center justify-content-end">
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
